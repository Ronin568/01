workflows:
  ios-build:
    name: Build DanmakuPiP
    environment:
      xcode: latest
      vars:
        XCODE_SCHEME: DanmakuPiP
    scripts:
      - name: Install XcodeGen
        script: |
          set -e
          echo "--- Installing XcodeGen ---"
          brew install xcodegen
          echo "XcodeGen installed: $(which xcodegen)"
          
      - name: Generate Xcode project
        script: |
          set -e
          echo "--- Current directory: $(pwd) ---"
          ls -la
          echo "--- Generating Xcode project ---"
          xcodegen generate -s project.yml
          echo "--- Generated project ---"
          ls -la DanmakuPiP.xcodeproj/
          
      - name: Build IPA
        script: |
          set -e
          echo "--- Building IPA ---"
          xcodebuild -project DanmakuPiP.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/DanmakuPiP.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            archive 2>&1
          
          echo "--- Exporting IPA ---"
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/DanmakuPiP.xcarchive" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            -exportPath "$CM_BUILD_DIR/build" 2>&1
    artifacts:
      - build/*.ipa
      - build/*.dSYM.zip
    publishing:
      email:
        recipients:
          - your_email@example.com